info:
  name: "09 User Change App"
  type: http
  seq: 9

http:
  method: PUT
  url: "{{baseUrl}}/applications/change-app"
  auth:
    type: bearer
    token: "{{userToken}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "id": {{mainAppId}},
        "title": "{{updatedTitle}}",
        "description": "{{updatedDescription}}",
        "comment": "{{userEditComment}}"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("user change app returns updated marker", function() {
          expect(res.status).to.equal(200);
          expect(res.body).to.be.an("object");
          expect(res.body.result).to.equal("updated");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
