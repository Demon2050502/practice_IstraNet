info:
  name: "33 Admin Delete User"
  type: http
  seq: 33

http:
  method: DELETE
  url: "{{baseUrl}}/api/admin/users/delete-user"
  auth:
    type: bearer
    token: "{{adminToken}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "user_id": {{managedUserId}}
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("admin can delete managed user", function() {
          expect(res.status).to.equal(200);
          expect(res.body).to.be.an("object");
          expect(res.body.result).to.equal("deleted");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

