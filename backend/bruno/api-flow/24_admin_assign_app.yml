info:
  name: "24 Admin Assign App"
  type: http
  seq: 24

http:
  method: PUT
  url: "{{baseUrl}}/api/admin/applications/assign-app"
  auth:
    type: bearer
    token: "{{adminToken}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "id": {{adminAppId}},
        "operator_id": {{operatorId}}
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("admin can assign app to operator", function() {
          expect(res.status).to.equal(200);
          expect(res.body).to.be.an("object");
          expect(res.body.result).to.equal("assigned");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

