info:
  name: "03 Auth Sign Up Operator"
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/auth/sign-up"
  auth: none
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{operatorEmail}}",
        "password": "{{operatorPassword}}",
        "full_name": "{{operatorFullName}}",
        "role": "operator"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("sign-up operator returns auth payload", function() {
          expect(res.status).to.equal(200);
          expect(res.body).to.be.an("object");
          expect(res.body.token).to.be.a("string");
          expect(res.body.token.trim()).to.not.equal("");
          expect(res.body.token.split(".")).to.have.length(3);
          expect(res.body.user).to.be.an("object");
          expect(res.body.user.name).to.equal(bru.getEnvVar("operatorFullName"));
          expect(res.body.user.role).to.equal("operator");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
