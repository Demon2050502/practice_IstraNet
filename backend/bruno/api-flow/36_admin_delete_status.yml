info:
  name: "36 Admin Delete Status"
  type: http
  seq: 36

http:
  method: DELETE
  url: "{{baseUrl}}/api/admin/dictionaries/delete-status"
  auth:
    type: bearer
    token: "{{adminToken}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "id": {{customStatusId}}
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("admin can delete custom status", function() {
          expect(res.status).to.equal(200);
          expect(res.body).to.be.an("object");
          expect(res.body.result).to.equal("deleted");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

