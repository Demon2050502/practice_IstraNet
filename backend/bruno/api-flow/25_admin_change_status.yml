info:
  name: "25 Admin Change Status"
  type: http
  seq: 25

http:
  method: PUT
  url: "{{baseUrl}}/api/admin/applications/change-status"
  auth:
    type: bearer
    token: "{{adminToken}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "id": {{adminAppId}},
        "status_code": "waiting",
        "comment": "{{adminStatusComment}}"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("admin can change app status", function() {
          expect(res.status).to.equal(200);
          expect(res.body).to.be.an("object");
          expect(res.body.result).to.equal("status_changed");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

