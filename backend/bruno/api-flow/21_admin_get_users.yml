info:
  name: "21 Admin Get Users"
  type: http
  seq: 21

http:
  method: GET
  url: "{{baseUrl}}/api/admin/users/get-users"
  auth:
    type: bearer
    token: "{{adminToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200 && res.body && Array.isArray(res.body.items)) {
          const operator = res.body.items.find((item) => item.email === bru.getEnvVar("operatorEmail"));
          if (operator && typeof operator.id === "number") {
            bru.setVar("operatorId", operator.id);
            bru.setEnvVar("operatorId", String(operator.id));
          }
        }
    - type: tests
      code: |-
        function findByEmail(items, email) {
          return items.find((item) => item.email === email);
        }

        test("admin get-users returns user, operator and admin", function() {
          const body = res.body;

          expect(res.status).to.equal(200);
          expect(body).to.be.an("object");
          expect(body.items).to.be.an("array");

          const userItem = findByEmail(body.items, bru.getEnvVar("userEmail"));
          const operatorItem = findByEmail(body.items, bru.getEnvVar("operatorEmail"));
          const adminItem = findByEmail(body.items, bru.getEnvVar("adminEmail"));

          expect(userItem, "user should be present").to.be.an("object");
          expect(operatorItem, "operator should be present").to.be.an("object");
          expect(adminItem, "admin should be present").to.be.an("object");

          expect(userItem.role_code).to.equal("user");
          expect(operatorItem.role_code).to.equal("operator");
          expect(adminItem.role_code).to.equal("admin");
          expect(operatorItem.id).to.be.a("number");
          expect(operatorItem.id).to.be.greaterThan(0);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

