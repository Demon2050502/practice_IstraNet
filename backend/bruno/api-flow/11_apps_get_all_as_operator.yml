info:
  name: "11 Apps Get All As Operator"
  type: http
  seq: 11

http:
  method: GET
  url: "{{baseUrl}}/applications/get-all-apps"
  auth:
    type: bearer
    token: "{{operatorToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        function findById(items, id) {
          return items.find((item) => item.id === id);
        }

        test("operator aggregate list sees only the surviving app", function() {
          const body = res.body;
          const mainAppId = bru.getVar("mainAppId");
          const deleteAppId = bru.getVar("deleteAppId");

          expect(res.status).to.equal(200);
          expect(body).to.be.an("object");
          expect(body.items).to.be.an("array");

          const mainItem = findById(body.items, mainAppId);
          const deletedItem = findById(body.items, deleteAppId);

          expect(mainItem, "main app should be present for operator").to.be.an("object");
          expect(deletedItem, "deleted app should be absent for operator").to.equal(undefined);

          expect(mainItem.title).to.equal(bru.getEnvVar("updatedTitle"));
          expect(mainItem.description).to.equal(bru.getEnvVar("updatedDescription"));
          expect(mainItem.status.code).to.equal("new");
          expect(mainItem.priority.code).to.equal("high");
          expect(mainItem.created_by.name).to.equal(bru.getEnvVar("userFullName"));
          expect(mainItem.assigned_to === null || typeof mainItem.assigned_to === "undefined").to.equal(true);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
