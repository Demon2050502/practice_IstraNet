info:
  name: "29 Admin Get Users With Managed"
  type: http
  seq: 29

http:
  method: GET
  url: "{{baseUrl}}/api/admin/users/get-users"
  auth:
    type: bearer
    token: "{{adminToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200 && res.body && Array.isArray(res.body.items)) {
          const managedUser = res.body.items.find((item) => item.email === bru.getEnvVar("managedUserEmail"));
          if (managedUser && typeof managedUser.id === "number") {
            bru.setVar("managedUserId", managedUser.id);
            bru.setEnvVar("managedUserId", String(managedUser.id));
          }
        }
    - type: tests
      code: |-
        test("admin get-users sees newly created managed user", function() {
          const body = res.body;
          const managedUser = body.items.find((item) => item.email === bru.getEnvVar("managedUserEmail"));

          expect(res.status).to.equal(200);
          expect(body).to.be.an("object");
          expect(body.items).to.be.an("array");
          expect(managedUser, "managed user should be present").to.be.an("object");
          expect(managedUser.role_code).to.equal("user");
          expect(managedUser.id).to.be.a("number");
          expect(managedUser.id).to.be.greaterThan(0);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

