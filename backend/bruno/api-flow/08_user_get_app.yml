info:
  name: "08 User Get App"
  type: http
  seq: 8

http:
  method: GET
  url: "{{baseUrl}}/applications/get-app?id={{mainAppId}}"
  auth:
    type: bearer
    token: "{{userToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        function expectPositiveNumber(value, field) {
          expect(value, `${field} should be a number`).to.be.a("number");
          expect(value, `${field} should be positive`).to.be.greaterThan(0);
        }

        function expectIsoDate(value, field) {
          expect(value, `${field} should be a string`).to.be.a("string");
          expect(Number.isNaN(Date.parse(value)), `${field} should be a valid ISO date`).to.equal(false);
        }

        test("user get app returns full details before edits", function() {
          const body = res.body;
          expect(res.status).to.equal(200);
          expect(body).to.be.an("object");
          expectPositiveNumber(body.id, "id");
          expect(body.id).to.equal(bru.getVar("mainAppId"));
          expect(body.title).to.equal(bru.getEnvVar("mainTitle"));
          expect(body.description).to.equal(bru.getEnvVar("mainDescription"));
          expect(body.status.code).to.equal("new");
          expect(body.priority.code).to.equal("high");
          expect(body.created_by.name).to.equal(bru.getEnvVar("userFullName"));
          expect(body.assigned_to === null || typeof body.assigned_to === "undefined").to.equal(true);
          expect(body.contact_phone).to.equal(bru.getEnvVar("contactPhone"));
          expect(body.contact_address).to.equal(bru.getEnvVar("contactAddress"));
          expectIsoDate(body.created_at, "created_at");
          expectIsoDate(body.updated_at, "updated_at");
          expect(body.comments === null || (Array.isArray(body.comments) && body.comments.length === 0)).to.equal(true);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
