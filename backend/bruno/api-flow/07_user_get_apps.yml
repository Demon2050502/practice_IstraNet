info:
  name: "07 User Get Apps"
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/applications/get-apps"
  auth:
    type: bearer
    token: "{{userToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        function expectIsoDate(value, field) {
          expect(value, `${field} should be a string`).to.be.a("string");
          expect(Number.isNaN(Date.parse(value)), `${field} should be a valid ISO date`).to.equal(false);
        }

        function findById(items, id) {
          return items.find((item) => item.id === id);
        }

        test("user apps list contains both fresh applications", function() {
          const body = res.body;
          const mainAppId = bru.getVar("mainAppId");
          const deleteAppId = bru.getVar("deleteAppId");

          expect(res.status).to.equal(200);
          expect(body).to.be.an("object");
          expect(body.items).to.be.an("array");

          const mainItem = findById(body.items, mainAppId);
          const deleteItem = findById(body.items, deleteAppId);

          expect(mainItem, "main app should be in user list").to.be.an("object");
          expect(deleteItem, "delete app should be in user list").to.be.an("object");

          expect(mainItem.title).to.equal(bru.getEnvVar("mainTitle"));
          expect(mainItem.status).to.equal("new");
          expect(mainItem.priority).to.equal("high");
          expectIsoDate(mainItem.created_at, "mainItem.created_at");

          expect(deleteItem.title).to.equal(bru.getEnvVar("deleteTitle"));
          expect(deleteItem.status).to.equal("new");
          expect(deleteItem.priority).to.equal("low");
          expectIsoDate(deleteItem.created_at, "deleteItem.created_at");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
