info:
  name: 30 Admin Get User
  type: http
  seq: 30

http:
  method: GET
  url: "{{baseUrl}}/api/admin/users/get-user?id={{managedUserId}}"
  auth:
    type: bearer
    token: "{{adminToken}}"

runtime:
  scripts:
    - type: tests
      code: |-
        test("admin get-user returns managed user details", function() {
          const body = res.body;

          expect(res.status).to.equal(200);
          expect(body).to.be.an("object");
          expect(body.id).to.equal(bru.getVar("managedUserId"));
          expect(body.email).to.equal(bru.getEnvVar("managedUserEmail"));
          expect(body.full_name).to.equal(bru.getEnvVar("managedUserFullName"));
          expect(body.role_code).to.equal("user");
          expect(body.is_active).to.equal(true);
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
