info:
  name: "02 Auth Sign In User"
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/sign-in"
  auth: none
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{userEmail}}",
        "password": "{{userPassword}}"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200 && res.body && res.body.token) {
          bru.setVar("userToken", res.body.token);
          bru.setEnvVar("userToken", res.body.token);
        }
    - type: tests
      code: |-
        test("sign-in user returns fresh token", function() {
          expect(res.status).to.equal(200);
          expect(res.body).to.be.an("object");
          expect(res.body.token).to.be.a("string");
          expect(res.body.token.trim()).to.not.equal("");
          expect(res.body.token.split(".")).to.have.length(3);
          expect(res.body.user).to.be.an("object");
          expect(res.body.user.name).to.equal(bru.getEnvVar("userFullName"));
          expect(res.body.user.role).to.equal("user");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
