<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | DeskNet</title>
    <link rel="stylesheet" href="./style/main_style/variables.css">
    <link rel="stylesheet" href="./style/main_style/main.css">
    <link rel="stylesheet" href="./style/modal_window/style_alert.css">
    <link rel="stylesheet" href="./style/auth_style.css">
</head>
<body>
    <div class="auth-layout">
        <header class="auth-topbar">
            <a class="auth-brand" href="/">
                <span class="auth-brand__mark">DN</span>
                <span class="auth-brand__text">DeskNet</span>
            </a>

            <a class="auth-topbar__back" href="/">На главную</a>
        </header>

        <main class="auth-page">
            <section class="auth-shell">
                <div class="auth-card">
                    <div class="auth-card__header">
                        <p class="auth-card__eyebrow">DeskNet</p>
                        <h1 class="auth-card__title">Вход в личный кабинет</h1>
                        <p class="auth-card__text">
                            Войдите в аккаунт или создайте новый профиль для работы с обращениями.
                        </p>
                    </div>

                    <div class="auth-tabs" role="tablist" aria-label="Форма авторизации">
                        <button class="auth-tab auth-tab--active" type="button" data-mode-button="sign-in">
                            Вход
                        </button>
                        <button class="auth-tab" type="button" data-mode-button="sign-up">
                            Регистрация
                        </button>
                    </div>

                    <div class="alert is-hidden" id="form-message" role="status" aria-live="polite"></div>

                    <form class="auth-form" id="auth-form" novalidate>
                        <div class="form-field form-field--name is-hidden" id="name-field">
                            <label class="form-field__label" for="full-name">Полное имя</label>
                            <input
                                class="form-field__input"
                                id="full-name"
                                name="full_name"
                                type="text"
                                autocomplete="name"
                                placeholder="Иван Иванов"
                            >
                        </div>

                        <div class="form-field">
                            <label class="form-field__label" for="email">Email</label>
                            <input
                                class="form-field__input"
                                id="email"
                                name="email"
                                type="email"
                                autocomplete="email"
                                placeholder="user@example.com"
                                required
                            >
                        </div>

                        <div class="form-field">
                            <label class="form-field__label" for="password">Пароль</label>
                            <input
                                class="form-field__input"
                                id="password"
                                name="password"
                                type="password"
                                autocomplete="current-password"
                                placeholder="Минимум 6 символов"
                                required
                            >
                        </div>

                        <button class="auth-form__submit" id="submit-button" type="submit">
                            Войти
                        </button>
                    </form>

                    <section class="account-state is-hidden" id="account-state" aria-live="polite">
                        <div class="account-state__header">
                            <span class="account-state__status-dot"></span>
                            <p class="account-state__status-text">Вы успешно вошли</p>
                        </div>

                        <div class="account-state__body">
                            <div class="account-state__row">
                                <span class="account-state__label">Имя</span>
                                <span class="account-state__value" id="account-name">-</span>
                            </div>

                            <div class="account-state__row">
                                <span class="account-state__label">Роль</span>
                                <span class="account-state__value" id="account-role">-</span>
                            </div>
                        </div>

                        <button class="account-state__logout" id="logout-button" type="button">
                            Выйти
                        </button>
                    </section>
                </div>
            </section>
        </main>
    </div>

    <script src="./js/main_js/main.js"></script>
</body>
</html>
